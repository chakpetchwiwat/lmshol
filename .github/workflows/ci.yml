name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  api-ci:
    name: API CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elearning-api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: elearning-api/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Tests
        run: npm test

  webapp-ci:
    name: WebApp CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elearning-webapp
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: elearning-webapp/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run Lint
        run: npm run lint

      - name: Build WebApp
        run: npm run build
