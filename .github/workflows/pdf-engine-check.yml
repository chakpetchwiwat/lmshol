name: PDF Engine Smoke Test

on:
  push:
    paths:
      - 'elearning-api/src/services/admin/certificatePdf.service.js'
      - 'elearning-api/src/utils/certificateTemplateRenderer.js'
      - '.github/workflows/pdf-engine-check.yml'

jobs:
  smoke-test:
    name: Puppeteer PDF Generation Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./elearning-api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'
          cache-dependency-path: './elearning-api/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Install Puppeteer System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates \
            fonts-liberation \
            libasound2 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libc6 \
            libcairo2 \
            libcups2 \
            libdbus-1-3 \
            libexpat1 \
            libfontconfig1 \
            libgbm1 \
            libgcc1 \
            libgconf-2-4 \
            libgdk-pixbuf2.0-0 \
            libglib2.0-0 \
            libgtk-3-0 \
            libnspr4 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libstdc++6 \
            libx11-6 \
            libx11-xcb1 \
            libxcb1 \
            libxcomposite1 \
            libxcursor1 \
            libxdamage1 \
            libxext6 \
            libxfixes3 \
            libxi6 \
            libxrandr2 \
            libxrender1 \
            libxss1 \
            libxtst6 \
            lsb-release \
            wget \
            xdg-utils

      - name: Run PDF Smoke Test
        run: |
          # Create a minimal script to test Puppeteer launch and PDF export
          echo "const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({ 
              headless: 'new', 
              args: ['--no-sandbox', '--disable-setuid-sandbox'] 
            });
            const page = await browser.newPage();
            await page.setContent('<h1>Smoke Test</h1>');
            const pdf = await page.pdf({ format: 'A4' });
            console.log('PDF Generated successfully: ' + pdf.length + ' bytes');
            await browser.close();
          })().catch(err => {
            console.error(err);
            process.exit(1);
          });" > smoke-test.js
          
          node smoke-test.js
